<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORN — Supplier Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- TOPBAR: light grey with user/logo -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="logo-bars">
      <span style="background:#1e3a5f;height:13px"></span>
      <span style="background:#1a6faf;height:16px"></span>
      <span style="background:#29a8e0;height:18px"></span>
      <span style="background:#3aaa35;height:15px"></span>
      <span style="background:#f5d700;height:13px"></span>
      <span style="background:#e03a1e;height:11px"></span>
    </div>
    <span class="logo-txt">ORN</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-user">&#128100; Ajay Kawa &#9660;</span>
    <img src="https://flagcdn.com/w20/gb.png" alt="EN" style="height:13px;border-radius:2px">
  </div>
</div>

<!-- PRIMARY NAV: white bar, navy active underline -->
<nav class="primary-nav" id="primary-nav">
  <a class="pnav" data-p="products" href="#">Products</a>
  <a class="pnav" data-p="sales" href="#">Manage Sales</a>
  <a class="pnav" data-p="supply" href="#">Supply Monitor</a>
  <a class="pnav active" data-p="suppliers" href="#">Manage Suppliers</a>
  <a class="pnav" data-p="hotels" href="#">Manage Hotels</a>
  <a class="pnav" data-p="activities" href="#">Manage Activities</a>
  <a class="pnav" data-p="vehicles" href="#">Leased Vehicles</a>
  <a class="pnav" data-p="delivery" href="#">Delivery Operations</a>
</nav>

<!-- SECONDARY NAV: white bar, bold underline active -->
<nav class="secondary-nav" id="secondary-nav"></nav>

<!-- CONTENT -->
<div class="content" id="content"></div>

<!-- MODAL OVERLAY -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
<div class="modal-box" id="modal-box">
  <div class="modal-header"><span id="modal-title">Modal</span><button class="modal-close" onclick="closeModal()">&#10005;</button></div>
  <div class="modal-body" id="modal-body"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
